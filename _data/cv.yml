    Publications:
      - title: "Unpacking digital transformation – Constructing a framework based on industry use cases"
        authors:
        - Saeed, Khawaja Asjad
        - Green, Andrew William
        - Hedrick, Alison Brooke
        doi: "10.1016/j.jik.2025.100759"
        url: "https://www.sciencedirect.com/science/article/pii/S2444569X25001040"
        journal: "Journal of Innovation & Knowledge"
        date: "2025-07-25"
        summary: "Based on industry use cases, we identify six distinct types of digital transformation (DT), each grounded in a specific concept or enabling technology. These DT types can be implemented individually or combined to drive transformation initiatives. While deploying a single DT type often focuses on improving operational efficiency or streamlining existing workflows, initiatives that combine multiple DT types tend to pursue more ambitious goals, such as the creation of new products, services, or business models. However, the complexity increases significantly with the integration of multiple DT types, as organizations must not only address behavioral changes but also overcome technical challenges involving systems integration, data architecture, and interoperability."

      - title: "What does ChatGPT Know about Information Systems?"
        authors:
        - O'Leary, Daniel E.
        - French, Aaron M.
        - Storey, Veda C.
        - Buckman, Joseph R.
        - Chua, Cecil
        - Green, Andrew William
        - Gu, Grace
        - Niederman, Fred
        - Pereira, Francis
        - Templeton, Gary
        - Wallace, Linda
        doi: "10.17705/1CAIS.05619"
        url: "https://aisel.aisnet.org/cais/vol56/iss1/19/"
        journal: "Communications of the Association for Information Systems"
        date: "2025-04-01"
        summary: "Large language models such as ChatGPT provide efficient access to a wealth of information. However, there are significant questions regarding the depth and quality of knowledge in any one domain. This paper focuses specifically on the information systems (IS) field and assesses ChatGPT's knowledge. To analyze the extent and quality of information systems knowledge derived from queries to ChatGPT, we used over 3,000 queries from a broad range of exam and quiz questions. These queries were obtained from university courses and professional information system certification exams. The query topics are based on a framework for information systems education, with queries gathered from multiple faculty members at different universities. The results of querying ChatGPT with these questions find that ChatGPT can answer 65% to 85% of information systems queries successfully, across each of the areas of the framework. ChatGPT performed well on essay, true/false and multiple choice questions, with no statistical difference between its success rate on multiple choice and true/false questions. We conclude that ChatGPT tends to perform approximately at the level of an average student, but may not perform at a level sufficient to pass certain professional exams. ChatGPT's knowledge is very broad, covering virtually all areas of the information systems knowledge we identified, but not at an expert level."

      - title: "To report or not to report? Extending Protection Motivation Theory to Vulnerability Discovery and Disclosure"
        authors:
        - Green, Andrew William
        - Oliver, DeJarvis
        - Woszczynski, Amy B.
        doi: "10.1016/j.cose.2024.103880"
        url:
        journal: "Computers & Security"
        date: "2024-07-01"
        summary: "Vulnerability researchers face difficult choices when considering whether to reporting a finding to an organization with which they are unaffiliated. We used components of Protection Motivation Theory (PMT) to create the Vulnerability Discovery and Disclosure (VDD) model to understand the decision-making processes of vulnerability researchers. PMT uses high fear appeals, threat appraisals, and coping appraisals to encourage employee prosocial behaviors while VDD proposes low fear and threat with high coping, to encourage reporting. In this exploratory study, we surveyed active vulnerability researchers to gain insight into their concerns when deciding to report to an organization. Using principal components analysis, we developed and refined the VDD survey, which may be tested by future researchers. We also discovered a higher-order efficacy construct, comprised of response and self-efficacy. We theorize that well-developed vulnerability disclosure policies, in line with a low-fear, low-threat appraisal and high efficacy may establish a culture of trust between organizations and vulnerability researchers, encouraging more reports."

      - title: "Principles of Network Security"
        authors:
        - Green, Andrew William
        - Whitman, Michael E.
        - Mattord, Herbert
        doi:
        url: "https://he.kendallhunt.com/product/principles-network-security"
        journal: "Kendall Hunt Publishing"
        date: "2024-01-01"
        summary: "Principles of Network Security offers a comprehensive, approachable, and up-to-date foundation for teaching network security to students in high school, trade school, or college-level courses. This textbook introduces core concepts in network security, cryptography, secure architecture, threat analysis, and monitoring while addressing modern challenges like IoT, cloud security, AI, and Zero Trust frameworks. Each chapter combines foundational theory with real-world examples and current best practices. The book emphasizes practical knowledge across layered topics, from the OSI and TCP/IP models and data communication protocols to firewall configuration, VPN deployments, wireless network protections, and access control models. It includes coverage of leading standards and frameworks from NIST, CIS, and ISO. Rich pedagogical features - such as learning objectives, review questions, hands-on exercises, and short projects - help reinforce key skills and prepare students for further study or entry into cybersecurity roles. Whether used in a semester-long survey or as a base for certification pathways, this textbook equips students with the knowledge they need to navigate the complexities of modern network security."

      - title: "Analysis of Honeypots in detecting Tactics, Techniques, and Procedures changes based on IP Address"
        authors:
        - Reynolds, Carson
        - Green, Andrew William
        doi:
        url: "https://aisel.aisnet.org/treos_amcis2023/1/"
        journal: "Americas Conference on Information Systems (AMCIS)"
        date: "2023-08-01"
        summary: "The financial and national security impacts of cybercrime globally are well documented. According to the 2020 FBI Internet Crime Report, financially motivated threat actors committed 86% of reported breaches, resulting in a total loss of approximately $4.1 billion in the United States alone (Federal Bureau of Investigation, 2022). In order to combat this, our research seeks to determine if threat actors change their tactics, techniques, and procedures (TTPs) based on the geolocation of their target's IP address. To answer this research question, we will construct a honeypot network distributed across multiple continents to collect attack data from geographically separate locations concurrently. We will configure the honeypots to offer vulnerable services and collect log data from the services for analysis. This approach will allow us to aggregate log data about attacks against specific services commonly targeted by threat actors. After we complete data collection, we will analyze the data to gain insight into the TTPs used by the threat actors. The analysis will use collected attack data attributes such as IP origin, service type, and executables delivered along with other transport layer analysis techniques to provide metadata on threat actor TTPs. Once the analysis is complete, we will have a greater insight into threat actor activities and produce a list of items that firms can use to monitor, protect, and maintain their environments and to detect attacks earlier, along with taking appropriate defensive action to lessen or eliminate the risk associated with these attacks."

